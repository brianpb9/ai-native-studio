<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI Native Studio — Run</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F}
  canvas{display:block}
</style>
</head>
<body>
<canvas id="g"></canvas>
<script>
const c=document.getElementById('g'),ctx=c.getContext('2d');
let W,H;
function rs(){W=c.width=innerWidth;H=c.height=innerHeight}rs();addEventListener('resize',rs);

// Game state
const player={x:W*.15,y:0,vy:0,w:30,h:40,onGround:true};
let obstacles=[],particles=[],score=0,speed=5,gameOver=false,started=false;
const GRAVITY=.8,JUMP=-13,GROUND=H*.75;

// Colors
const COL={bg:'#0A0A0F',ground:'#1A1A2E',player:'#00D2FF',obstacle:'#6C5CE7',text:'#E8E8F0'};

// Jump
function jump(){if(player.onGround){player.vy=JUMP;player.onGround=false;if(!started)started=true}}

addEventListener('keydown',e=>{if(e.key===' '||e.key==='Spacebar'){e.preventDefault();gameOver?reset():jump()}});
c.addEventListener('click',()=>gameOver?reset():jump());
c.addEventListener('touchstart',e=>{e.preventDefault();gameOver?reset():jump()});

function reset(){player.y=GROUND;player.vy=0;player.onGround=true;obstacles=[];particles=[];score=0;speed=5;gameOver=false;started=false}

function spawnObstacle(){
  const h=30+Math.random()*40;
  obstacles.push({x:W+50,y:GROUND-h,w:25+Math.random()*20,h,passed:false});
}

// Spawn timer
let spawnTimer=0;

function gameLoop(){
  ctx.fillStyle=COL.bg;ctx.fillRect(0,0,W,H);

  // Stars
  ctx.fillStyle='rgba(255,255,255,.2)';
  for(let i=0;i<80;i++){const sx=(i*137.5+Date.now()*.01)%W,sy=(i*97.3)%H*.6;ctx.fillRect(sx,sy,1,1)}

  // Ground
  ctx.fillStyle=COL.ground;ctx.fillRect(0,GROUND+player.h,W,4);
  // Ground line
  ctx.strokeStyle='rgba(108,92,231,.3)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,GROUND+player.h+2);ctx.lineTo(W,GROUND+player.h+2);ctx.stroke();

  // ── UPDATE ──
  if(started&&!gameOver){
    // Player physics
    player.vy+=GRAVITY;
    player.y+=player.vy;
    if(player.y>=GROUND){player.y=GROUND;player.vy=0;player.onGround=true}

    // Speed increase
    speed=5+Math.floor(score/50)*.5;

    // Spawn obstacles
    spawnTimer++;
    if(spawnTimer>Math.max(30,120-speed*5)){spawnTimer=0;spawnObstacle()}

    // Move obstacles
    for(let i=obstacles.length-1;i>=0;i--){
      const o=obstacles[i];
      o.x-=speed;
      // Score
      if(!o.passed&&o.x+o.w<player.x){o.passed=true;score+=10}
      // Remove off screen
      if(o.x<-100)obstacles.splice(i,1);
    }

    // Collision
    for(const o of obstacles){
      if(
        player.x<o.x+o.w&&player.x+player.w>o.x&&
        player.y<o.y+o.h&&player.y+player.h>o.y
      ){
        gameOver=true;
        // Particles
        for(let i=0;i<20;i++)particles.push({x:player.x+player.w/2,y:player.y+player.h/2,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8-4,life:1,color:Math.random()<.5?'#00D2FF':'#6C5CE7',size:3+Math.random()*5});
      }
    }
  }

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life-=.03;
    if(p.life<=0)particles.splice(i,1);
    else{ctx.fillStyle=p.color.replace(')',`,${p.life})`);ctx.fillRect(p.x,p.y,p.size,p.size)}
  }

  // ── DRAW ──
  // Obstacles
  for(const o of obstacles){
    ctx.fillStyle='#6C5CE7';ctx.fillRect(o.x,o.y,o.w,o.h);
    // Highlight
    ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(o.x,o.y,o.w,3);
    // Glow
    ctx.fillStyle='rgba(108,92,231,.15)';ctx.fillRect(o.x-2,o.y-2,o.w+4,o.h+4);
  }

  // Player
  const px=player.x,py=player.y;
  // Glow
  ctx.fillStyle='rgba(0,210,255,.2)';ctx.fillRect(px-4,py-4,player.w+8,player.h+8);
  // Body
  const bob=player.onGround?Math.abs(Math.sin(Date.now()*.01))*3:0;
  ctx.fillStyle='#00D2FF';ctx.fillRect(px,py+bob,player.w,player.h);
  // Highlight
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(px,py+bob,player.w,4);
  // Eyes
  ctx.fillStyle='#0A0A0F';ctx.fillRect(px+player.w-12,py+8+bob,6,6);

  // Score
  ctx.fillStyle='rgba(255,255,255,.8)';
  ctx.font='bold 20px Inter,system-ui,sans-serif';
  ctx.textAlign='right';
  ctx.fillText(`${score}`,W-30,50);

  // Speed indicator
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.font='11px DM Mono,monospace';
  ctx.fillText(`${Math.floor(speed*10)/10}x`,W-30,75);

  // Start hint
  if(!started&&!gameOver){
    ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.font='bold clamp(1.5rem,4vw,2.5rem) Cabinet Grotesk,system-ui,sans-serif';
    ctx.textAlign='center';
    ctx.fillText('AI NATIVE STUDIO',W/2,H*.35);
    ctx.fillStyle='rgba(0,210,255,.6)';
    ctx.font='clamp(.7rem,1.5vw,.9rem) DM Mono,monospace';
    ctx.fillText('Press SPACE or TAP to start',W/2,H*.35+40);
  }

  // Game over
  if(gameOver){
    ctx.fillStyle='rgba(10,10,15,.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff';
    ctx.font='bold clamp(2rem,5vw,3rem) Cabinet Grotesk,system-ui,sans-serif';
    ctx.textAlign='center';
    ctx.fillText('Game Over',W/2,H*.4);
    ctx.fillStyle='rgba(0,210,255,.8)';
    ctx.font='clamp(.8rem,2vw,1rem) DM Mono,monospace';
    ctx.fillText(`Score: ${score}  |  Click to retry`,W/2,H*.4+40);
  }

  requestAnimationFrame(gameLoop);
}
player.y=GROUND;
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
