<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Native Studio — Play to Explore</title>
<meta name="description" content="The first AI-native game studio. Explore a world generated in real-time.">
<meta property="og:title" content="AI Native Studio — Play">
<meta property="og:description" content="Move. Build. Explore. This website is a game.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F;font-family:'Inter',system-ui,sans-serif;color:#E8E8F0}
  
  #game{position:fixed;inset:0;z-index:1}

  /* HUD overlay */
  #hud{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:2rem}
  #hud>*{pointer-events:auto}

  .hud-top{display:flex;justify-content:space-between;align-items:flex-start}
  .hud-brand{font-family:'Cabinet Grotesk',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:-.02em;background:linear-gradient(135deg,#00D2FF,#6C5CE7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none}
  .hud-nav{display:flex;gap:2rem;list-style:none}
  .hud-nav a{color:rgba(255,255,255,.5);text-decoration:none;font-size:.8rem;transition:color .2s}
  .hud-nav a:hover{color:#fff}

  .hud-center{text-align:center;pointer-events:none}
  .hud-title{font-family:'Cabinet Grotesk',sans-serif;font-weight:900;font-size:clamp(2.5rem,6vw,5rem);line-height:1;letter-spacing:-.03em;text-shadow:0 0 60px rgba(0,0,0,.8)}
  .hud-title span{display:block}.hud-title .cyan{color:#00D2FF}.hud-title .white{color:#fff}.hud-title .purple{color:#6C5CE7}
  .hud-hint{font-family:'DM Mono',monospace;color:rgba(0,210,255,.6);font-size:.75rem;margin-top:1.5rem;letter-spacing:.15em}

  .hud-bottom{display:flex;justify-content:space-between;align-items:flex-end}
  .hud-controls{font-family:'DM Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.35);line-height:1.8}
  .hud-controls span{color:rgba(108,92,231,.7)}
  .hud-stats{display:flex;gap:2rem;font-size:.75rem}
  .hud-stat{text-align:right}
  .hud-stat-val{font-family:'DM Mono',monospace;color:#00D2FF;font-size:1.1rem}
  .hud-stat-label{color:rgba(255,255,255,.35);font-size:.6rem;text-transform:uppercase;letter-spacing:.1em}

  /* Sections overlay */
  #sections{position:fixed;inset:0;z-index:5;pointer-events:none;display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;transition:opacity .8s}
  #sections.show{opacity:1}
  .section-card{background:rgba(10,10,15,.85);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:3rem;max-width:600px;text-align:center;backdrop-filter:blur(20px);pointer-events:auto;margin:1rem}
  .section-card h2{font-family:'Cabinet Grotesk',sans-serif;font-weight:800;font-size:2rem;margin-bottom:.5rem}
  .section-card p{color:rgba(255,255,255,.5);line-height:1.6;margin-bottom:1.5rem}
  .section-card .btn{display:inline-block;font-family:'Cabinet Grotesk',sans-serif;font-weight:700;padding:.75rem 2rem;border-radius:50px;background:linear-gradient(135deg,#6C5CE7,#00D2FF);color:#fff;text-decoration:none;font-size:.9rem;transition:all .3s}
  .section-card .btn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(108,92,231,.4)}

  /* Transition flash */
  #flash{position:fixed;inset:0;z-index:20;background:#6C5CE7;opacity:0;pointer-events:none;transition:opacity .15s}
  #flash.active{opacity:.15}

  @media(max-width:768px){
    #hud{padding:1rem}
    .hud-nav{gap:1rem}.hud-nav a{font-size:.7rem}
    .hud-controls{display:none}
    .section-card{padding:2rem;margin:.5rem}
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="flash"></div>

<div id="hud">
  <div class="hud-top">
    <div class="hud-brand">AI NATIVE</div>
    <ul class="hud-nav">
      <li><a href="#" onclick="showSection('velocity')">Velocity</a></li>
      <li><a href="#" onclick="showSection('scale')">Scale</a></li>
      <li><a href="#" onclick="showSection('pipeline')">Pipeline</a></li>
      <li><a href="#" onclick="showSection('cta')">Contact</a></li>
    </ul>
  </div>
  <div class="hud-center" id="hud-title">
    <div class="hud-title"><span class="cyan">AI</span><span class="white">NATIVE</span><span class="purple">STUDIO</span></div>
    <div class="hud-hint">✦ WASD/Arrows to explore · Click to build · Scroll to zoom ✦</div>
  </div>
  <div class="hud-bottom">
    <div class="hud-controls"><span>WASD</span> move &nbsp; <span>CLICK</span> build &nbsp; <span>SCROLL</span> zoom &nbsp; <span>E</span> interact</div>
    <div class="hud-stats">
      <div class="hud-stat"><div class="hud-stat-val" id="stat-blocks">0</div><div class="hud-stat-label">Blocks Placed</div></div>
      <div class="hud-stat"><div class="hud-stat-val" id="stat-worlds">0</div><div class="hud-stat-label">Worlds Generated</div></div>
    </div>
  </div>
</div>

<div id="sections"></div>

<script>
// ══════════════════════════════════════════
// GAME ENGINE — World Explorer
// ══════════════════════════════════════════
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W,H,camera={x:0,y:0,zoom:1,targetZoom:1};

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// ── WORLD ──
const CHUNK=64; // pixels per chunk
const world={}; // key: "cx,cy" → {blocks:[], color, biome}
let blocksPlaced=0,worldsGenerated=0;

const BIOMES=['cyber','forest','desert','ocean','volcano'];
const biomeColors={
  cyber:['rgba(0,210,255,.3)','rgba(108,92,231,.2)','rgba(0,210,255,.15)'],
  forest:['rgba(0,255,136,.2)','rgba(0,200,100,.15)','rgba(100,200,50,.1)'],
  desert:['rgba(255,200,100,.2)','rgba(255,180,50,.15)','rgba(200,150,50,.1)'],
  ocean:['rgba(0,150,255,.2)','rgba(0,100,200,.15)','rgba(0,200,255,.1)'],
  volcano:['rgba(255,80,50,.2)','rgba(255,120,30,.15)','rgba(200,50,20,.1)']
};

function chunkKey(cx,cy){return `${Math.floor(cx/CHUNK)},${Math.floor(cy/CHUNK)}`}

function generateChunk(cx,cy){
  const key=chunkKey(cx,cy);
  if(world[key])return;
  const seed=cx*1000+cy;
  const biome=BIOMES[Math.abs(Math.floor(seed))%BIOMES.length];
  const blocks=[];
  // Procedural generation based on noise
  for(let i=0;i<8+(Math.abs(seed)%12);i++){
    const bx=cx+(seed*7+i*13)%CHUNK;
    const by=cy+(seed*11+i*17)%CHUNK;
    const size=3+(Math.abs(seed+i*3)%12);
    blocks.push({x:bx,y:by,w:size,h:size});
  }
  world[key]={blocks,biome,generated:Date.now()};
  worldsGenerated++;
  document.getElementById('stat-worlds').textContent=worldsGenerated;
}

// ── PLAYER ──
const player={x:0,y:0,vx:0,vy:0,speed:4,size:12,trail:[]};
const keys={};
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;e.key==='e'&&interact()});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});

// ── PARTICLES ──
const particles=[];
function spawnParticles(x,y,color,count=8){
  for(let i=0;i<count;i++){
    particles.push({x,y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:1,decay:.02+Math.random()*.04,size:3+Math.random()*4,color});
  }
}

// ── BUILD ──
canvas.addEventListener('click',e=>{
  const wx=(e.clientX-W/2)/camera.zoom+camera.x;
  const wy=(e.clientY-H/2)/camera.zoom+camera.y;
  const key=chunkKey(wx,wy);
  if(!world[key])generateChunk(Math.floor(wx/CHUNK)*CHUNK,Math.floor(wy/CHUNK)*CHUNK);
  if(world[key]){
    world[key].blocks.push({x:wx-24,y:wy-24,w:48,h:48});
    blocksPlaced++;
    document.getElementById('stat-blocks').textContent=blocksPlaced;
    spawnParticles(wx,wy,'#00D2FF',15);
    // Flash
    const f=document.getElementById('flash');f.classList.add('active');setTimeout(()=>f.classList.remove('active'),150);
  }
});

// ── SCROLL ZOOM ──
canvas.addEventListener('wheel',e=>{e.preventDefault();camera.targetZoom=Math.max(.3,Math.min(3,camera.targetZoom-e.deltaY*.001))},{passive:false});

// ── SECTIONS ──
const sectionsDiv=document.getElementById('sections');
const sections={
  velocity:{title:'48 Hours',sub:'Concept to Prototype',desc:'Traditional studios take months. We ship game-ready prototypes in two days. AI handles asset generation, level design, and physics.',btn:'Learn More'},
  scale:{title:'5,000+ Assets',sub:'Per Project',desc:'Our AI pipeline generates thousands of production-ready assets — textures, 3D models, animations, sound effects. All coherent. All game-ready.',btn:'See Pipeline'},
  pipeline:{title:'How It Works',sub:'Four Steps. Zero Friction.',desc:'Prompt → Generate → Iterate → Deploy. From blank canvas to deployed game. No build pipelines. No waiting.',btn:'Start Building'},
  cta:{title:'The Future',sub:'Is Generated',desc:'Stop wrestling with engines. Build the game you\'ve been dreaming about. Today.',btn:'<a href="mailto:hello@hdrv.studio" class="btn">Join Waitlist</a>'}
};
let currentSection=null;

function showSection(id){
  if(currentSection===id){sectionsDiv.classList.remove('show');currentSection=null;return}
  currentSection=id;
  const s=sections[id];
  sectionsDiv.innerHTML=`<div class="section-card"><h2>${s.title}<br>${s.sub}</h2><p>${s.desc}</p>${s.btn}</div>`;
  sectionsDiv.classList.add('show');
  spawnParticles(player.x,player.y,'#6C5CE7',25);
}
window.showSection=showSection;

function interact(){
  // Find nearest chunk center
  const cx=Math.round(player.x/CHUNK)*CHUNK;
  const cy=Math.round(player.y/CHUNK)*CHUNK;
  generateChunk(cx,cy);
  spawnParticles(cx,cy,'#00FF88',20);
}

// ── GAME LOOP ──
let lastTime=0;
function gameLoop(time){
  const dt=Math.min((time-lastTime)/16.67,3);lastTime=time;

  // Player input
  player.vx=0;player.vy=0;
  if(keys['w']||keys['arrowup'])player.vy=-1;
  if(keys['s']||keys['arrowdown'])player.vy=1;
  if(keys['a']||keys['arrowleft'])player.vx=-1;
  if(keys['d']||keys['arrowright'])player.vx=1;

  // Normalize diagonal
  if(player.vx&&player.vy){player.vx*=.707;player.vy*=.707}

  player.x+=player.vx*player.speed*dt;
  player.y+=player.vy*player.speed*dt;

  // Trail
  if(player.vx||player.vy){
    player.trail.push({x:player.x,y:player.y,life:1});
    if(player.trail.length>20)player.trail.shift();
  }

  // Generate chunks around player
  const pcx=Math.floor(player.x/CHUNK)*CHUNK,pcy=Math.floor(player.y/CHUNK)*CHUNK;
  for(let dx=-CHUNK*2;dx<=CHUNK*2;dx+=CHUNK)
    for(let dy=-CHUNK*2;dy<=CHUNK*2;dy+=CHUNK)
      generateChunk(pcx+dx,pcy+dy);

  // Camera
  camera.x+=(player.x-camera.x)*.08;
  camera.y+=(player.y-camera.y)*.08;
  camera.zoom+=(camera.targetZoom-camera.zoom)*.1;

  // Particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=p.decay*dt;
    if(p.life<=0)particles.splice(i,1);
  }

  // Trail decay
  for(let i=player.trail.length-1;i>=0;i--){
    player.trail[i].life-=.04*dt;
    if(player.trail[i].life<=0)player.trail.splice(i,1);
  }

  // ── RENDER ──
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle='#0A0A0F';ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(W/2,H/2);
  ctx.scale(camera.zoom,camera.zoom);
  ctx.translate(-camera.x,-camera.y);

  // Draw chunks
  for(const[key,chunk]of Object.entries(world)){
    const colors=biomeColors[chunk.biome]||biomeColors.cyber;
    // Ground
    ctx.fillStyle=colors[0];
    const[cx,cy]=key.split(',').map(Number);
    ctx.fillRect(cx,cy,CHUNK,CHUNK);
    // Grid lines
    ctx.strokeStyle=colors[2];
    ctx.lineWidth=.5;
    ctx.strokeRect(cx,cy,CHUNK,CHUNK);
    // Blocks
    for(const b of chunk.blocks){
      const age=(Date.now()-chunk.generated)/5000;
      const alpha=.4+Math.min(.6,age)*.5;
      ctx.fillStyle=colors[1].replace(/[\d.]+\)$/,alpha+')');
      ctx.fillRect(b.x,b.y,b.w,b.h);
      // Border
      ctx.strokeStyle=colors[0].replace(/[\d.]+\)$/,'.6)');
      ctx.lineWidth=1;
      ctx.strokeRect(b.x,b.y,b.w,b.h);
    }
  }

  // Player trail
  for(const t of player.trail){
    ctx.beginPath();ctx.arc(t.x,t.y,player.size*.4*t.life,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,210,255,${t.life*.3})`;ctx.fill();
  }

  // Player
  const bob=player.vx||player.vy?Math.sin(time*.01)*2:0;
  // Glow
  ctx.beginPath();ctx.arc(player.x,player.y+bob,player.size*2,0,Math.PI*2);
  ctx.fillStyle='rgba(0,210,255,.1)';ctx.fill();
  // Body
  ctx.beginPath();ctx.arc(player.x,player.y+bob,player.size,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
  // Inner
  ctx.beginPath();ctx.arc(player.x,player.y+bob,player.size*.6,0,Math.PI*2);
  ctx.fillStyle='#00D2FF';ctx.fill();

  // Particles
  for(const p of particles){
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color.replace(')',`,${p.life})`);ctx.fill();
  }

  ctx.restore();

  // Grid overlay (subtle)
  ctx.strokeStyle='rgba(108,92,231,.03)';
  ctx.lineWidth=.5;
  const gs=80/camera.zoom;
  const ox=-camera.x%gs,oy=-camera.y%gs;
  ctx.beginPath();
  for(let x=ox;x<W;x+=gs){ctx.moveTo(x,0);ctx.lineTo(x,H)}
  for(let y=oy;y<H;y+=gs){ctx.moveTo(0,y);ctx.lineTo(W,y)}
  ctx.stroke();

  // Vignette
  const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*.4,W/2,H/2,Math.max(W,H)*.8);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(10,10,15,.6)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  requestAnimationFrame(gameLoop);
}

// Start
generateChunk(0,0);
generateChunk(CHUNK,0);
generateChunk(-CHUNK,0);
generateChunk(0,CHUNK);
generateChunk(0,-CHUNK);
requestAnimationFrame(gameLoop);

// Touch controls
let touchActive=false,touchStart={};
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){touchActive=true;touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY}}
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(touchActive&&e.touches.length===1){
    const dx=e.touches[0].clientX-touchStart.x;
    const dy=e.touches[0].clientY-touchStart.y;
    keys['d']=dx>15;keys['a']=dx<-15;
    keys['s']=dy>15;keys['w']=dy<-15;
  }
},{passive:false});
canvas.addEventListener('touchend',()=>{touchActive=false;keys['w']=keys['a']=keys['s']=keys['d']=false});

console.log('%c🎮 AI Native Studio %c v9 %c — This website is a game.',
  'color:#6C5CE7;font-size:1.2em','color:#00D2FF','color:#00FF88;');
</script>
</body>
</html>
